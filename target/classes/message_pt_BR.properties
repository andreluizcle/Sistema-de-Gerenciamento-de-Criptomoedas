# Ajuda
ajuda.texto=O FT-Coin e um sistema de acompanhamento de carteira de moeda virtual.\n\
O programa permite:\n\
  - Gerenciar carteiras (incluir, consultar, editar, excluir);\n\
  - Registrar compras e vendas de moeda virtual;\n\
  - Consultar a cotacao diaria via Oraculo;\n\
  - Gerar relatorios de saldo, historico e apuracao de ganhos/perdas;\n\
  - Trabalhar com persistencia em memoria ou banco relacional (MariaDB).\n\n\
Use o menu principal para navegar entre as funcionalidades.\n\
Em qualquer submenu, escolha 0 para retornar ao menu anterior.

