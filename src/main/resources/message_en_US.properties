# Help
ajuda.texto=FT-Coin is a virtual coin wallet tracking system.\n\
The program allows you to:\n\
  - Manage wallets (add, query, edit, delete);\n\
  - Record buy and sell transactions of virtual coin;\n\
  - Query daily quotes via the Oracle;\n\
  - Generate balance, history and gain/loss reports;\n\
  - Work with in-memory persistence or a relational database (MariaDB).\n\n\
Use the main menu to navigate between features.\n\
On any submenu, choose 0 to go back to the previous menu.

